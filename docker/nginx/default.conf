# 127.0.0.11 — встроенный DNS Docker. Через переменную в proxy_pass имя backend
# резолвится при запросе, а не при старте nginx (иначе «host not found», если web
# поднялся раньше backend или контейнер запущен не через compose-сеть).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Иначе браузер может отдать 304 Not Modified и остаться старый index.html / разметка
    etag off;
    if_modified_since off;

    resolver 127.0.0.11 ipv6=off valid=10s;
    resolver_timeout 5s;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    set $django_upstream http://backend:8000;

    location /api/ {
        proxy_pass $django_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /media/ {
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
    }

    # Версия деплоя фронта: клиент запрашивает сразу при старте (см. main.jsx), без кэша
    location = /build.json {
        default_type application/json;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0, private" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        expires -1;
        try_files $uri =404;
    }

    # Vite: хешированные бандлы — долго в кэше (имя файла меняется при каждой сборке)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA: не кэшировать shell — иначе после деплоя остаётся старый index со ссылками на старые чанки
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0, private" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        expires -1;
    }

    location / {
        # Ответы, ушедшие в /index.html (SPA), тоже без долгого кэша
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0, private" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        expires -1;
        try_files $uri $uri/ /index.html;
    }
}
