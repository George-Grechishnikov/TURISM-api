# 127.0.0.11 — встроенный DNS Docker. Через переменную в proxy_pass имя backend
# резолвится при запросе, а не при старте nginx (иначе «host not found», если web
# поднялся раньше backend или контейнер запущен не через compose-сеть).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 ipv6=off valid=10s;
    resolver_timeout 5s;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    set $django_upstream http://backend:8000;

    location /api/ {
        proxy_pass $django_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /media/ {
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
    }

    # SPA: не кэшировать shell — иначе после деплоя остаётся старый index без #sommelier-root
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
